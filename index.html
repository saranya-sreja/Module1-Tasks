<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Computer Lab - Generations of Computing</title>
    <!-- Three.js and OrbitControls via CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --dark: #212121;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- Dashboard Layout --- */
        #app-container { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .main-dashboard {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            overflow-y: auto;
        }

        .gen-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
            border-bottom: 5px solid var(--secondary);
        }

        .gen-card:hover { transform: translateY(-5px); }
        .gen-card h3 { margin-top: 0; color: var(--primary); }
        .gen-card p { font-size: 0.9rem; color: #666; }

        /* --- 3D Scene View --- */
        #lab-view {
            display: none;
            position: relative;
            flex: 1;
            background: #000;
        }

        #three-canvas-container { width: 100%; height: 100%; }

        /* --- Experiment Engine UI --- */
        #experiment-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        .step-active { color: var(--secondary); font-weight: bold; }
        #observation-log {
            height: 100px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            margin-top: 10px;
            padding: 5px;
            font-size: 0.85rem;
            overflow-y: auto;
        }

        /* --- UI Elements --- */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-exit { background: var(--accent); }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
        }

        #result-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
            text-align: center;
        }

        .equation-box {
            font-size: 1.5rem;
            padding: 2rem;
            border: 2px dashed var(--secondary);
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h2 id="header-title">Virtual Computer Lab</h2>
        <button class="btn btn-exit" id="back-to-dash" style="display:none;">Exit Lab</button>
    </header>

    <!-- Dashboard -->
    <div class="main-dashboard" id="dashboard">
        <!-- Cards generated by JS -->
    </div>

    <!-- 3D Lab View -->
    <div id="lab-view">
        <div id="three-canvas-container"></div>
        
        <div id="experiment-overlay">
            <h4 id="exp-title">Experiment</h4>
            <div id="step-desc">Loading instructions...</div>
            <div id="hint-text" style="color: #888; font-style: italic; font-size: 0.8rem; margin-top: 5px;"></div>
            <div id="observation-log"><strong>Log:</strong><br></div>
            <button class="btn" id="validate-btn" style="margin-top: 10px; width: 100%;">Verify Action</button>
        </div>
    </div>
</div>

<div id="toast">Feedback message</div>

<div id="result-overlay">
    <div class="equation-box">
        <h3>Experiment Complete!</h3>
        <p id="final-stats"></p>
        <p>Efficiency Formula:</p>
        <div id="math-formula"></div>
        <button class="btn" onclick="location.reload()" style="margin-top: 20px;">Return to Dashboard</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Data from Context ---
    const generations = [
        { id: 1, name: "1st Gen", period: "1940-1956", component: "Vacuum Tubes", color: 0xff5733, info: "Big in size, consumed more power." },
        { id: 2, name: "2nd Gen", period: "1956-1964", component: "Transistors", color: 0x33ff57, info: "Smaller, generated less heat." },
        { id: 3, name: "3rd Gen", period: "1964-1971", component: "Integrated Circuits", color: 0x3357ff, info: "Faster and more reliable." },
        { id: 4, name: "4th Gen", period: "1971-1980", component: "Microprocessors", color: 0xf333ff, info: "VLSI, portable computers introduced." },
        { id: 5, name: "5th Gen", period: "1980-Present", component: "ULSI", color: 0xffff33, info: "Artificial Intelligence and Robotics." }
    ];[cite: 1, 2]

    // --- State Management ---
    let currentGen = null;
    let scene, camera, renderer, controls, raycaster, mouse;
    let shelfItems = [];
    let currentStep = 0;
    let animationId;

    // --- Initialization ---
    function initDashboard() {
        const dash = document.getElementById('dashboard');
        generations.forEach(gen => {
            const card = document.createElement('div');
            card.className = 'gen-card';
            card.innerHTML = `
                <h3>${gen.name}</h3>
                <p><strong>Period:</strong> ${gen.period}</p>
                <p><strong>Core:</strong> ${gen.component}</p>
                <p>${gen.info}</p>
            `;
            card.onclick = () => startExperiment(gen);
            dash.appendChild(card);
        });
    }

    function startExperiment(gen) {
        currentGen = gen;
        currentStep = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('lab-view').style.display = 'block';
        document.getElementById('back-to-dash').style.display = 'block';
        document.getElementById('header-title').innerText = `Lab: ${gen.name} Analysis`;
        
        init3DScene();
        updateExperimentUI();
        showToast(`Entering ${gen.name} Environment...`);
    }

    // --- 3D Scene Setup ---
    function init3DScene() {
        const container = document.getElementById('three-canvas-container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const point = new THREE.PointLight(0xffffff, 1);
        point.position.set(5, 5, 5);
        scene.add(point);

        // Add Shelf Items (Abstracted as boxes)
        shelfItems = [];
        for(let i = -2; i <= 2; i++) {
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshStandardMaterial({ 
                color: i + 3 === currentGen.id ? currentGen.color : 0x888888 
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(i * 1.5, 0.5, 0);
            cube.userData = { id: i + 3, name: generations[i+2].component };
            scene.add(cube);
            shelfItems.push(cube);
        }

        // Shelf Plane
        const shelfGeo = new THREE.BoxGeometry(8, 0.1, 2);
        const shelfMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const shelf = new THREE.Mesh(shelfGeo, shelfMat);
        scene.add(shelf);

        window.addEventListener('mousedown', onMouseDown);
        animate();
    }

    function onMouseDown(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(shelfItems);

        if (intersects.length > 0) {
            const obj = intersects[0].object;
            handleItemClick(obj.userData);
        }
    }

    function animate() {
        animationId = requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // --- Experiment Logic ---
    const steps = [
        { desc: "Identify and select the correct core component from the shelf.", hint: "Look for the colored block." },
        { desc: "Analyze the component's heat generation and size.", hint: "Click the block again to log observations." },
        { desc: "Finalize the generation report.", hint: "Press the verify button to finish." }
    ];

    function handleItemClick(data) {
        const log = document.getElementById('observation-log');
        if (currentStep === 0) {
            if (data.id === currentGen.id) {
                log.innerHTML += `> Selected: ${data.name}<br>`;
                showToast("Correct Component Found!");
                currentStep++;
                updateExperimentUI();
            } else {
                showToast("Wrong component! Try again.");
            }
        } else if (currentStep === 1) {
            log.innerHTML += `> Logged: ${currentGen.info}<br>`;
            currentStep++;
            updateExperimentUI();
        }
    }

    function updateExperimentUI() {
        if (currentStep < steps.length) {
            document.getElementById('step-desc').innerText = steps[currentStep].desc;
            document.getElementById('hint-text').innerText = "Hint: " + steps[currentStep].hint;
        }
    }

    document.getElementById('validate-btn').onclick = () => {
        if (currentStep >= 2) {
            showFinalResult();
        } else {
            showToast("Complete all steps before verifying!");
        }
    };

    function showFinalResult() {
        const overlay = document.getElementById('result-overlay');
        const stats = document.getElementById('final-stats');
        const formula = document.getElementById('math-formula');
        
        overlay.style.display = 'flex';
        stats.innerText = `You successfully analyzed the ${currentGen.name} (${currentGen.component}).`;
        
        // Simple mock efficiency equation based on gen ID
        const efficiency = (currentGen.id * 20).toFixed(0);
        formula.innerHTML = `$$Efficiency = \\frac{Speed}{Power} = ${efficiency}\\%$$`;
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // --- Cleanup ---
    document.getElementById('back-to-dash').onclick = () => {
        cancelAnimationFrame(animationId);
        window.removeEventListener('mousedown', onMouseDown);
        if(renderer) {
            renderer.dispose();
            const container = document.getElementById('three-canvas-container');
            if(container.firstChild) container.removeChild(renderer.domElement);
        }
        document.getElementById('lab-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
        document.getElementById('back-to-dash').style.display = 'none';
        document.getElementById('header-title').innerText = "Virtual Computer Lab";
        document.getElementById('observation-log').innerHTML = "<strong>Log:</strong><br>";
    };

    window.onload = initDashboard;
</script>

</body>
</html>
